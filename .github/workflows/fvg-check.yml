name: FVG Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run FVG check
        run: npx tsx api/cron/fvg-check.ts
        env:
          AICOIN_WEBHOOK_TOKEN: unused
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_USER_ID_TYPE: ${{ secrets.LARK_USER_ID_TYPE }}
          LARK_URGENT_USER_IDS: ${{ secrets.LARK_URGENT_USER_IDS }}
